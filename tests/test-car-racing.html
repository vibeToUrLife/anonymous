<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test: Lane Racer (car) logic</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    .pass { color: #34d399; }
    .fail { color: #f87171; font-weight: bold; }
    h2 { color: #a5b4fc; }
    .summary { margin-top: 20px; padding: 10px; border-radius: 8px; font-size: 16px; }
    .summary.all-pass { background: rgba(52,211,153,0.15); border: 1px solid #34d399; }
    .summary.has-fail { background: rgba(248,113,113,0.15); border: 1px solid #f87171; }
  </style>
  <!-- Pull in the SAME pure logic the game uses, so tests stay in sync. -->
  <script src="../games/car/car-logic.js"></script>
</head>
<body>
  <h1>🧪 Lane Racer — Unit Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <script>
    let _passed = 0, _failed = 0;
    const resultsEl = document.getElementById('results');
    function assert(cond, msg) {
      if (cond) { _passed++; resultsEl.innerHTML += '<div class="pass">✓ ' + msg + '</div>'; }
      else { _failed++; resultsEl.innerHTML += '<div class="fail">✗ ' + msg + '</div>'; }
    }
    function section(t) { resultsEl.innerHTML += '<h2>' + t + '</h2>'; }

    /* 1. Obstacle rows always leave exactly one open lane */
    section('1. Obstacle row generation (2 blocked, 1 open)');
    (function () {
      // Deterministic RNG cycling through values so each open lane is exercised.
      const seq = [0.0, 0.4, 0.8, 0.99];
      let i = 0;
      const rng = () => seq[(i++) % seq.length];
      for (let n = 0; n < 12; n++) {
        const row = CarLogic.makeObstacleRow(rng);
        assert(row.blocked.length === CarLogic.LANES - 1, 'Row blocks exactly ' + (CarLogic.LANES - 1) + ' lanes');
        assert(row.blocked.indexOf(row.openLane) === -1, 'Open lane is not in blocked list');
        assert(row.openLane >= 0 && row.openLane < CarLogic.LANES, 'Open lane within range');
      }
    })();

    /* 1b. Consecutive rows always leave a reachable corridor (open lane within ±1) */
    section('1b. Reachable corridor between rows');
    (function () {
      let prev = 1; // start in the middle
      for (let n = 0; n < 200; n++) {
        const row = CarLogic.makeObstacleRow(Math.random, prev);
        assert(Math.abs(row.openLane - prev) <= 1, 'New open lane ' + row.openLane + ' reachable from ' + prev);
        prev = row.openLane;
      }
    })();

    /* 2. Crash detection */
    section('2. Crash detection');
    (function () {
      const row = { openLane: 1, blocked: [0, 2] };
      assert(CarLogic.isCrash(row, 0) === true, 'Lane 0 (blocked) crashes');
      assert(CarLogic.isCrash(row, 2) === true, 'Lane 2 (blocked) crashes');
      assert(CarLogic.isCrash(row, 1) === false, 'Lane 1 (open) is safe');
    })();

    /* 3. Near-miss detection */
    section('3. Near-miss detection');
    (function () {
      const row = { openLane: 1, blocked: [0, 2] };
      assert(CarLogic.isNearMiss(row, 1) === true, 'Middle open lane next to two blocks = near miss');
      assert(CarLogic.isNearMiss(row, 0) === false, 'Crashing lane is never a near miss');
      const edgeOpen = { openLane: 0, blocked: [1, 2] };
      assert(CarLogic.isNearMiss(edgeOpen, 0) === true, 'Edge open lane adjacent to a block = near miss');
    })();

    /* 4. Speed ramps up over time and respects difficulty + cap */
    section('4. Speed ramp & difficulty');
    (function () {
      const e0 = CarLogic.speedAt('normal', 0);
      const e10 = CarLogic.speedAt('normal', 10);
      assert(e10 > e0, 'Speed increases with elapsed time');
      assert(CarLogic.speedAt('hard', 5) > CarLogic.speedAt('easy', 5), 'Hard is faster than Easy at same time');
      const capped = CarLogic.speedAt('normal', 100000);
      assert(capped === CarLogic.DIFFICULTIES.normal.maxSpeed, 'Speed never exceeds maxSpeed');
      assert(CarLogic.speedAt('normal', -5) === CarLogic.DIFFICULTIES.normal.baseSpeed, 'Negative time clamps to baseSpeed');
      assert(CarLogic.getDifficulty('does-not-exist').id === 'normal', 'Unknown difficulty falls back to normal');
    })();

    /* 5. Coin rewards scale with difficulty and near-miss */
    section('5. Coin & score rewards');
    (function () {
      assert(CarLogic.coinsForPass('hard', false) >= CarLogic.coinsForPass('easy', false), 'Hard pays >= Easy');
      assert(CarLogic.coinsForPass('normal', true) > CarLogic.coinsForPass('normal', false), 'Near-miss pays more coins');
      assert(CarLogic.coinsForPass('easy', false) >= 0, 'Coins never negative');
      assert(CarLogic.scoreForPass(true) > CarLogic.scoreForPass(false), 'Near-miss scores more points');
    })();

    /* 6. Buying skins / effects (pure) */
    section('6. Catalog purchases');
    (function () {
      const buyable = CarLogic.SKINS.find(s => s.price > 0);
      // Insufficient funds rejected.
      let r = CarLogic.buyCatalogItem({ coins: 0, owned: ['classic'] }, CarLogic.SKINS, buyable.id);
      assert(r.ok === false && r.reason === 'insufficient', 'Cannot buy without enough coins');
      // Enough funds: succeeds, deducts coins, adds to owned.
      r = CarLogic.buyCatalogItem({ coins: buyable.price + 50, owned: ['classic'] }, CarLogic.SKINS, buyable.id);
      assert(r.ok === true, 'Buy succeeds with enough coins');
      assert(r.coins === 50, 'Coins deducted correctly');
      assert(r.owned.indexOf(buyable.id) !== -1, 'New skin added to owned');
      // Already owned rejected.
      const r2 = CarLogic.buyCatalogItem({ coins: 999, owned: [buyable.id] }, CarLogic.SKINS, buyable.id);
      assert(r2.ok === false && r2.reason === 'owned', 'Cannot re-buy an owned item');
      // Unknown id rejected.
      const r3 = CarLogic.buyCatalogItem({ coins: 999, owned: [] }, CarLogic.SKINS, 'nope');
      assert(r3.ok === false && r3.reason === 'not_found', 'Unknown skin rejected');
    })();

    /* 7. Buying consumable power-up items (pure) */
    section('7. Power-up item purchases');
    (function () {
      const price = CarLogic.ITEMS.shield.price;
      let r = CarLogic.buyItem(price - 1, 'shield', 1);
      assert(r.ok === false && r.reason === 'insufficient', 'Cannot buy item without enough coins');
      r = CarLogic.buyItem(price * 3, 'shield', 2);
      assert(r.ok === true, 'Buying 2 shields succeeds');
      assert(r.coins === price * 3 - price * 2, 'Bulk cost deducted correctly');
      assert(r.qty === 2, 'Quantity returned');
      const r2 = CarLogic.buyItem(999, 'bogus', 1);
      assert(r2.ok === false && r2.reason === 'not_found', 'Unknown item rejected');
    })();

    // Summary
    const sum = document.getElementById('summary');
    sum.className = 'summary ' + (_failed === 0 ? 'all-pass' : 'has-fail');
    sum.textContent = _failed === 0
      ? '✅ All ' + _passed + ' tests passed!'
      : '❌ ' + _failed + ' failed, ' + _passed + ' passed.';
  </script>
</body>
</html>
