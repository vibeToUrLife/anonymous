<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test: Live Board logic</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    .pass { color: #34d399; }
    .fail { color: #f87171; font-weight: bold; }
    h2 { color: #a5b4fc; }
    .summary { margin-top: 20px; padding: 10px; border-radius: 8px; font-size: 16px; }
    .summary.all-pass { background: rgba(52,211,153,0.15); border: 1px solid #34d399; }
    .summary.has-fail { background: rgba(248,113,113,0.15); border: 1px solid #f87171; }
  </style>
  <!-- Pull in the SAME pure logic the board uses, so tests stay in sync. -->
  <script src="../src/js/board-live-logic.js"></script>
</head>
<body>
  <h1>🧪 Live Board — Unit Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <script>
    let _passed = 0, _failed = 0;
    const resultsEl = document.getElementById('results');
    function assert(cond, msg) {
      if (cond) { _passed++; resultsEl.innerHTML += '<div class="pass">✓ ' + msg + '</div>'; }
      else { _failed++; resultsEl.innerHTML += '<div class="fail">✗ ' + msg + '</div>'; }
    }
    function section(t) { resultsEl.innerHTML += '<h2>' + t + '</h2>'; }
    const B = BoardLive;

    /* 0. Config sanity */
    section('0. Config');
    (function () {
      assert(Array.isArray(B.REACTIONS) && B.REACTIONS.length >= 4, 'Reaction palette has emojis');
      assert(Array.isArray(B.PG_COLORS) && B.PG_COLORS.length >= 4, 'Playground colour palette present');
      assert(B.PRESENCE_TTL_MS > B.HEARTBEAT_MS, 'Heartbeat is more frequent than the offline TTL');
      assert(B.POP_DAILY_CAP > 0 && B.POP_COINS_EACH > 0, 'Pop coin tunables are positive');
    })();

    /* 1. Presence — online count */
    section('1. countOnline');
    (function () {
      const now = 1000000;
      const ttl = B.PRESENCE_TTL_MS;
      const docs = [
        { lastSeen: now },             // fresh
        { lastSeen: now - 1000 },      // fresh
        { lastSeen: now - ttl - 1 },   // stale → offline
        { lastSeen: 0 },               // marked offline on leave
        { /* no lastSeen */ },         // malformed
        null                            // junk
      ];
      assert(B.countOnline(docs, now) === 2, 'Counts only docs with a fresh heartbeat');
      assert(B.countOnline([], now) === 0, 'Empty list → 0 online');
      assert(B.countOnline(null, now) === 0, 'Non-array input → 0 online (no throw)');
      assert(B.countOnline([{ lastSeen: now - ttl }], now) === 1, 'Exactly at the TTL boundary still counts');
    })();

    /* 2. Presence — someone else typing */
    section('2. someoneElseTyping');
    (function () {
      const now = 1000000;
      const docs = [
        { uid: 'me',  typing: true,  lastSeen: now },   // myself — excluded
        { uid: 'a',   typing: false, lastSeen: now },   // not typing
        { uid: 'b',   typing: true,  lastSeen: now }    // someone else typing
      ];
      assert(B.someoneElseTyping(docs, now, 'me') === true, 'Detects another user typing');
      assert(B.someoneElseTyping([{ uid: 'me', typing: true, lastSeen: now }], now, 'me') === false,
        'My own typing does not count');
      const stale = [{ uid: 'b', typing: true, lastSeen: now - B.PRESENCE_TTL_MS - 1 }];
      assert(B.someoneElseTyping(stale, now, 'me') === false, 'Stale typing flag is ignored');
      assert(B.someoneElseTyping([], now, 'me') === false, 'Empty list → nobody typing');
    })();

    /* 3. Reactions — event creation */
    section('3. makeReactionEvent');
    (function () {
      const e1 = B.makeReactionEvent('u1', 0, 'x', 2);
      const e2 = B.makeReactionEvent('u1', 1, 'x', 2);
      assert(e1.id !== e2.id, 'Different seq → different id');
      assert(e1.i === 2, 'Emoji index preserved');
      const wrapped = B.makeReactionEvent('u1', 0, 'y', B.REACTIONS.length + 1);
      assert(wrapped.i === 1 % B.REACTIONS.length, 'Out-of-range index wraps into palette');
      const neg = B.makeReactionEvent('u1', 0, 'z', -1);
      assert(neg.i >= 0 && neg.i < B.REACTIONS.length, 'Negative index wraps to a valid emoji');
      const anon = B.makeReactionEvent(null, 5, 'q', 0);
      assert(anon.id.indexOf('anon:') === 0, 'Missing uid falls back to anon');
    })();

    /* 4. Reactions — trim & dedupe */
    section('4. trimEvents & unseenEvents');
    (function () {
      const many = [];
      for (let i = 0; i < B.REACTION_CAP + 10; i++) many.push({ id: 'e' + i, i: 0 });
      const trimmed = B.trimEvents(many);
      assert(trimmed.length === B.REACTION_CAP, 'Trims down to the cap');
      assert(trimmed[trimmed.length - 1].id === 'e' + (many.length - 1), 'Keeps the most recent events');
      assert(B.trimEvents([{ id: 'a' }]).length === 1, 'Below-cap list is left intact');
      assert(B.trimEvents(null).length === 0, 'Non-array → empty (no throw)');

      const seen = new Set(['e0', 'e1']);
      const events = [{ id: 'e0', i: 0 }, { id: 'e1', i: 0 }, { id: 'e2', i: 0 }];
      const fresh = B.unseenEvents(events, seen);
      assert(fresh.length === 1 && fresh[0].id === 'e2', 'Returns only events not already seen');
      assert(B.unseenEvents(events, new Set()).length === 3, 'Empty seen set → all events fresh');
    })();

    /* 5. Playground — daily pop-coin cap */
    section('5. grantPopCoins (daily cap)');
    (function () {
      const cap = B.POP_DAILY_CAP, each = B.POP_COINS_EACH;
      // First pop of the day starts a fresh counter.
      let r = B.grantPopCoins(null, '2026-06-07', 1);
      assert(r.granted === each, 'First pop grants the per-pop amount');
      assert(r.state.day === '2026-06-07' && r.state.count === each, 'State tracks the day and running count');

      // Accumulate up to the cap.
      let state = null, total = 0;
      for (let i = 0; i < cap + 5; i++) {
        const res = B.grantPopCoins(state, '2026-06-07', 1);
        total += res.granted; state = res.state;
      }
      assert(total === cap, 'Total granted never exceeds the daily cap');
      assert(state.count === cap, 'Counter is clamped at the cap');
      const overCap = B.grantPopCoins(state, '2026-06-07', 1);
      assert(overCap.granted === 0, 'Pops past the cap grant nothing');

      // New day resets the allowance.
      const nextDay = B.grantPopCoins(state, '2026-06-08', 1);
      assert(nextDay.granted === each && nextDay.state.count === each, 'Cap resets when the day rolls over');

      // Defensive inputs.
      assert(B.grantPopCoins(null, '2026-06-07', 0).granted === 0, 'Zero pops grant zero');
      assert(B.grantPopCoins(null, '2026-06-07', -3).granted === 0, 'Negative pops grant zero (no throw)');
      assert(B.grantPopCoins(null, '2026-06-07', 1, 0).granted === 0, 'A zero cap grants nothing');
    })();

    // Summary
    const sum = document.getElementById('summary');
    sum.className = 'summary ' + (_failed === 0 ? 'all-pass' : 'has-fail');
    sum.textContent = _failed === 0
      ? '✅ All ' + _passed + ' tests passed!'
      : '❌ ' + _failed + ' failed, ' + _passed + ' passed.';
  </script>
</body>
</html>
