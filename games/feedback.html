<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../src/js/maintenance.js"></script>
  <script>if(localStorage.getItem('access_code_verified')!=='true'){document.documentElement.style.display='none';window.location.replace('../index.html');}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Corner</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--g-bg); background-attachment: fixed;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--g-ink);
      overflow-x: hidden;
    }

    /* ── Back button ── */
    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 50;
      padding: 8px 16px;
      border: 1px solid var(--g-border);
      border-radius: 12px;
      background: var(--g-card-90);
      color: var(--g-ink-soft);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s; box-shadow: var(--g-shadow-sm);
    }
    .back-btn:hover { background: var(--g-card-hover); color: var(--g-ink); }

    /* ── Header ── */
    .page-title {
      text-align: center;
      padding: 40px 20px 6px;
      font-size: 26px;
      font-weight: 700;
      font-family: var(--g-display);
      background: var(--g-title-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--g-ink-soft);
      padding-bottom: 20px;
    }

    /* ── Feedback input area ── */
    .feedback-input-area {
      max-width: 520px;
      margin: 0 auto 24px;
      padding: 0 16px;
    }
    .feedback-input-area textarea {
      width: 100%;
      min-height: 80px;
      padding: 14px 18px;
      border: 1px solid var(--g-border);
      border-radius: 14px;
      background: var(--g-card-hover);
      color: var(--g-ink);
      font-size: 14px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .feedback-input-area textarea::placeholder { color: var(--g-ink-faint); }
    .feedback-input-area textarea:focus { border-color: var(--g-accent); }

    .feedback-submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .feedback-submit-btn {
      padding: 10px 28px;
      border: none;
      border-radius: 24px;
      background: var(--g-accent-grad);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; box-shadow: var(--g-shadow-sm);
    }
    .feedback-submit-btn:hover { opacity: 0.9; }
    .feedback-submit-btn:active { transform: scale(0.96); }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 0 16px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 6px 16px;
      border: 1px solid var(--g-border);
      border-radius: 20px;
      background: var(--g-card-90);
      color: var(--g-ink-soft);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab:hover { background: var(--g-card-hover); }
    .filter-tab.active {
      background: rgba(255,122,92,0.18);
      border-color: rgba(255,122,92,0.4);
      color: var(--g-accent);
    }

    /* ── Feedback list ── */
    .feedback-list {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .feedback-empty {
      text-align: center;
      color: var(--g-ink-faint);
      font-size: 14px;
      padding: 40px 0;
    }

    /* ── Feedback card ── */
    .feedback-card {
      width: 100%;
      max-width: 520px;
      background: var(--g-card);
      border: 1px solid var(--g-border);
      border-radius: 16px;
      padding: 16px 18px;
      transition: border-color 0.2s; box-shadow: var(--g-shadow);
    }
    .feedback-card:hover { border-color: rgba(255,122,92,0.4); }

    .feedback-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .feedback-time {
      font-size: 11px;
      color: var(--g-ink-faint);
    }

    .feedback-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .feedback-status.pending {
      background: rgba(251,191,36,0.18);
      color: #B57A0F;
      border: 1px solid rgba(251,191,36,0.35);
    }
    .feedback-status.developing {
      background: rgba(96,165,250,0.18);
      color: #2E6FCC;
      border: 1px solid rgba(96,165,250,0.35);
    }
    .feedback-status.done {
      background: rgba(52,211,153,0.18);
      color: #2BA86A;
      border: 1px solid rgba(52,211,153,0.35);
    }
    .feedback-status.rejected {
      background: rgba(248,113,113,0.18);
      color: var(--g-danger);
      border: 1px solid rgba(248,113,113,0.35);
    }

    .feedback-body {
      font-size: 14px;
      line-height: 1.55;
      color: var(--g-ink);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Votes (upvote) ── */
    .feedback-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .feedback-upvote {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border: 1px solid var(--g-border);
      border-radius: 16px;
      background: transparent;
      color: var(--g-ink-soft);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .feedback-upvote:hover { background: var(--g-hover); color: var(--g-ink); }
    .feedback-upvote.voted {
      background: rgba(255,122,92,0.15);
      border-color: rgba(255,122,92,0.3);
      color: var(--g-accent);
    }

    /* ── Dev controls ── */
    .dev-controls {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--g-border);
    }

    .dev-status-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .dev-status-btn {
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid var(--g-border);
      background: var(--g-card-90);
      color: var(--g-ink-soft);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dev-status-btn:hover { background: var(--g-card-hover); }
    .dev-status-btn.active { border-color: rgba(255,122,92,0.5); background: rgba(255,122,92,0.18); color: var(--g-accent); }

    .dev-comment-row {
      display: flex;
      gap: 8px;
    }
    .dev-comment-input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid var(--g-border);
      border-radius: 12px;
      background: var(--g-card-hover);
      color: var(--g-ink);
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }
    .dev-comment-input::placeholder { color: var(--g-ink-faint); }
    .dev-comment-send {
      padding: 6px 14px;
      border: none;
      border-radius: 12px;
      background: var(--g-accent-grad);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .dev-comment-send:hover { opacity: 0.9; }

    /* ── Dev comments list ── */
    .feedback-comments {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .feedback-comment {
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,122,92,0.08);
      border-left: 3px solid rgba(255,122,92,0.4);
      font-size: 12px;
      color: var(--g-ink-soft);
      line-height: 1.45;
    }
    .feedback-comment .comment-meta {
      font-size: 10px;
      color: var(--g-ink-faint);
      margin-top: 4px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 28px;
      border-radius: 16px;
      background: var(--g-card);
      color: var(--g-ink);
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
      white-space: nowrap;
      border: 1px solid var(--g-border); box-shadow: var(--g-shadow);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .feedback-card { border-radius: 12px; padding: 14px 14px; }
      .page-title { font-size: 22px; padding-top: 50px; }
    }
  </style>
</head>
<body>

  <a class="back-btn" href="../index.html">← Back</a>

  <h1 class="page-title">💬 Feedback Corner</h1>
  <p class="page-subtitle">Share your ideas & suggestions anonymously</p>

  <!-- Submit feedback -->
  <div class="feedback-input-area">
    <textarea id="feedbackInput" placeholder="Write your feedback, suggestion, or bug report…" maxlength="1000"></textarea>
    <div class="feedback-submit-row">
      <button class="feedback-submit-btn" id="submitFeedbackBtn">📩 Submit Feedback</button>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="pending">⏳ Pending</button>
    <button class="filter-tab" data-filter="developing">🔧 Developing</button>
    <button class="filter-tab" data-filter="done">✅ Done</button>
    <button class="filter-tab" data-filter="rejected">❌ Rejected</button>
  </div>

  <!-- Feedback list -->
  <div class="feedback-list" id="feedbackList">
    <div class="feedback-empty">Loading…</div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="../src/js/firebase-config.js"></script>
  <script>
    /* ── Firebase init ── */
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    /* ── Developer user IDs ── */
    const DEV_UIDS = [
      'HClZmAeuEaUVjHqUaFLFFMTMQnd2',
      'eUs3isAgsaRT9VLKEFI4HEFbCnk1'
    ];

    let currentUid = null;
    let isDev = false;
    let currentFilter = 'all';

    /* ── Auth ── */
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = '../index.html';
        return;
      }
      currentUid = user.uid;
      isDev = DEV_UIDS.includes(currentUid);
      listenFeedback();
    });

    /* ── Toast ── */
    let _toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    /* ── Submit feedback ── */
    document.getElementById('submitFeedbackBtn').addEventListener('click', async () => {
      const input = document.getElementById('feedbackInput');
      const text = input.value.trim();
      if (!text) return showToast('Please write some feedback first!');
      if (text.length > 1000) return showToast('Feedback is too long (max 1000 chars)');

      try {
        await db.collection('feedback').add({
          text: text,
          status: 'pending',
          votes: [],
          comments: [],
          createdAt: Date.now(),
          uid: currentUid
        });
        input.value = '';
        showToast('📩 Feedback submitted! Thank you!');
      } catch (e) {
        console.error(e);
        showToast('Failed to submit feedback');
      }
    });

    /* ── Filter tabs ── */
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderFeedback();
      });
    });

    /* ── Real-time listener ── */
    let feedbackData = [];

    function listenFeedback() {
      db.collection('feedback')
        .orderBy('createdAt', 'desc')
        .onSnapshot(snap => {
          feedbackData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderFeedback();
        }, err => {
          console.error('Feedback listen error:', err);
        });
    }

    /* ── Render ── */
    function renderFeedback() {
      const list = document.getElementById('feedbackList');

      // Apply filter
      let items = feedbackData;
      if (currentFilter !== 'all') {
        items = items.filter(f => f.status === currentFilter);
      }

      if (!items.length) {
        list.innerHTML = '<div class="feedback-empty">No feedback yet — be the first!</div>';
        return;
      }

      list.innerHTML = items.map(f => {
        const date = new Date(f.createdAt);
        const timeStr = date.toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: 'numeric' }) +
          ' ' + date.toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' });

        const statusLabel = {
          pending: '⏳ Pending',
          developing: '🔧 Developing',
          done: '✅ Done',
          rejected: '❌ Rejected'
        };

        const voteCount = (f.votes || []).length;
        const hasVoted = (f.votes || []).includes(currentUid);

        // Comments section
        let commentsHtml = '';
        if (f.comments && f.comments.length) {
          commentsHtml = '<div class="feedback-comments">' +
            f.comments.map(c => {
              const cd = new Date(c.at);
              const ct = cd.toLocaleDateString('en-MY', { day: 'numeric', month: 'short' }) +
                ' ' + cd.toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' });
              return '<div class="feedback-comment">' +
                '<div>' + escapeHtml(c.text) + '</div>' +
                '<div class="comment-meta">Developer · ' + ct + '</div>' +
                '</div>';
            }).join('') +
            '</div>';
        }

        // Dev controls (only for developers)
        let devHtml = '';
        if (isDev) {
          const statuses = ['pending', 'developing', 'done', 'rejected'];
          devHtml = '<div class="dev-controls">' +
            '<div class="dev-status-row">' +
            statuses.map(s =>
              '<button class="dev-status-btn' + (f.status === s ? ' active' : '') + '" onclick="setStatus(\'' + f.id + '\',\'' + s + '\')">' +
              statusLabel[s] + '</button>'
            ).join('') +
            '</div>' +
            '<div class="dev-comment-row">' +
            '<input class="dev-comment-input" id="comment_' + f.id + '" placeholder="Leave a dev comment…" maxlength="500">' +
            '<button class="dev-comment-send" onclick="addComment(\'' + f.id + '\')">Send</button>' +
            '</div>' +
            '</div>';
        }

        return '<div class="feedback-card" data-id="' + f.id + '">' +
          '<div class="feedback-header">' +
          '<span class="feedback-time">' + timeStr + '</span>' +
          '<span class="feedback-status ' + f.status + '">' + (statusLabel[f.status] || '⏳ Pending') + '</span>' +
          '</div>' +
          '<div class="feedback-body">' + escapeHtml(f.text) + '</div>' +
          '<div class="feedback-footer">' +
          '<button class="feedback-upvote' + (hasVoted ? ' voted' : '') + '" onclick="toggleVote(\'' + f.id + '\')">' +
          '👍 ' + voteCount +
          '</button>' +
          '</div>' +
          commentsHtml +
          devHtml +
          '</div>';
      }).join('');
    }

    /* ── Escape HTML ── */
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ── Toggle upvote ── */
    async function toggleVote(feedbackId) {
      if (!currentUid) return;
      const ref = db.collection('feedback').doc(feedbackId);
      const doc = await ref.get();
      if (!doc.exists) return;
      const votes = doc.data().votes || [];
      if (votes.includes(currentUid)) {
        // Remove vote
        await ref.update({
          votes: firebase.firestore.FieldValue.arrayRemove(currentUid)
        });
      } else {
        // Add vote
        await ref.update({
          votes: firebase.firestore.FieldValue.arrayUnion(currentUid)
        });
      }
    }

    /* ── Dev: set feedback status ── */
    async function setStatus(feedbackId, status) {
      if (!isDev) return;
      try {
        await db.collection('feedback').doc(feedbackId).update({ status: status });
        showToast('Status updated to ' + status);
      } catch (e) {
        console.error(e);
        showToast('Failed to update status');
      }
    }

    /* ── Dev: add comment ── */
    async function addComment(feedbackId) {
      if (!isDev) return;
      const input = document.getElementById('comment_' + feedbackId);
      const text = input.value.trim();
      if (!text) return;
      if (text.length > 500) return showToast('Comment too long');

      try {
        await db.collection('feedback').doc(feedbackId).update({
          comments: firebase.firestore.FieldValue.arrayUnion({
            text: text,
            by: currentUid,
            at: Date.now()
          })
        });
        input.value = '';
        showToast('Comment added');
      } catch (e) {
        console.error(e);
        showToast('Failed to add comment');
      }
    }
  </script>
</body>
</html>
